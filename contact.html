<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Upgrad Virtual Event Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Upgrad Events</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div style="width: 100%; max-width: 600px;">
            <h2 class="text-center mb-4 fw-normal">Contact Us</h2>
            <form id="contactForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="contactName" placeholder="Shoaib" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" id="contactEmail" placeholder="shoaib.ghachi@gmail.com" required>
                </div>
                <div class="mb-3">
                    <textarea class="form-control" id="contactMessage" rows="2" placeholder="getting link is expired" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Query</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="mb-0">© 2026 Upgrad Virtual Event Management System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            const message = document.getElementById('contactMessage').value;

            console.log('Contact Feedback:', { name, email, message });
            alert('Your query has been submitted successfully.');
            this.reset();
        });
    </script>
</body>
</html>
