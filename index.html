<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrad Virtual Event Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Upgrad Events</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Welcome to Virtual Events</h1>
            <p class="lead mb-4">Experience world-class learning and professional events from anywhere.</p>
            <a href="#events" class="btn btn-light btn-lg px-4 fw-bold">Browse Events</a>
        </div>
    </section>

    <!-- Events Section -->
    <main id="events" class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h2 class="fw-bold">Upcoming Events</h2>
                <div class="bg-primary mx-auto" style="width: 50px; height: 4px; border-radius: 2px;"></div>
            </div>
        </div>

        <div class="row g-4" id="eventList">
            <!-- Events will be rendered here by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="mb-0">© 2026 Upgrad Virtual Event Management System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents();
        });

        function renderEvents() {
            const events = JSON.parse(localStorage.getItem('events')) || [];
            const eventList = document.getElementById('eventList');
            eventList.innerHTML = '';

            if (events.length === 0) {
                eventList.innerHTML = '<div class="col-12 text-center text-muted">No upcoming events found.</div>';
                return;
            }

            events.forEach(event => {
                const card = `
                    <div class="col-md-6 col-lg-4">
                        <div class="custom-card p-4">
                            <span class="badge bg-primary mb-2">${event.category}</span>
                            <h4 class="fw-bold mb-3">${event.name}</h4>
                            <div class="small">
                                <p class="mb-1"><strong>ID:</strong> ${event.id}</p>
                                <p class="mb-1"><strong>Date:</strong> ${event.date}</p>
                                <p class="mb-3"><strong>Time:</strong> ${event.time}</p>
                            </div>
                            <button onclick="registerEvent('${event.id}')" class="btn btn-primary w-100">Register Now</button>
                        </div>
                    </div>
                `;
                eventList.innerHTML += card;
            });
        }

        function registerEvent(id) {
            window.location.href = `register.html?id=${id}`;
        }
    </script>
</body>
</html>
