<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Upgrad Virtual Event Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Admin Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Upgrad Events</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="alertPlaceholder"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Manage Events</h2>
            <button class="btn btn-danger px-4" id="logoutBtn">Logout</button>
        </div>

        <div class="row">
            <div class="col-12">
                <!-- Add Event Section -->
                <div class="section-box">
                    <h5 class="fw-bold mb-3">Add Event</h5>
                    <form id="addEventForm">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="eventId" placeholder="Event ID" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="eventName" placeholder="Event Name" required>
                        </div>
                        <div class="mb-3">
                            <select class="form-select" id="eventCategory" required>
                                <option value="" selected disabled>Select Category</option>
                                <option value="Tech & Innovations">Tech & Innovations</option>
                                <option value="Industrial Event">Industrial Event</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="date" class="form-control" id="eventDate" placeholder="dd-mm-yyyy" required>
                        </div>
                        <div class="mb-3">
                            <input type="time" class="form-control" id="eventTime" required>
                        </div>
                        <div class="mb-3">
                            <input type="url" class="form-control" id="eventUrl" placeholder="Event URL" required>
                        </div>
                        <button type="submit" class="btn btn-success px-4" id="addEventBtn">Add Event</button>
                    </form>
                </div>

                <!-- Search Event Section -->
                <div class="section-box" style="border: 2px solid #ffeb3b; border-radius: 10px;">
                    <h5 class="fw-bold mb-3">Search Event</h5>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <select class="form-select" id="searchCategory">
                                <option value="" selected disabled>Category</option>
                                <option value="Tech & Innovations">Tech & Innovations</option>
                                <option value="Industrial Event">Industrial Event</option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <input type="text" class="form-control" id="specificEvent" placeholder="Industrial Event">
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" id="searchBtn">Search</button>
                        </div>
                    </div>
                </div>

                <div id="adminEventList" class="row g-3 mt-4">
                    <!-- Events will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
    <script>
        // Check authentication on load
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
